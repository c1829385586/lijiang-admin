    function getNotificationIcon(title) {
      if (title.includes('订单')) return '📦'
      if (title.includes('商家') || title.includes('入驻')) return '🏪'
      if (title.includes('系统') || title.includes('公告')) return '📢'
      if (title.includes('会员') || title.includes('用户')) return '👤'
      if (title.includes('评价') || title.includes('投诉')) return '⭐'
      if (title.includes('财务') || title.includes('退款')) return '💰'
      return '🔔'
    }

                <div class="modal-body">
                  <div class="detail-row">
                    <div class="detail-label">商家名称</div>
                    <div class="detail-value">${merchant.name}</div>
                  </div>
                  <div class="detail-row">
                    <div class="detail-label">类型</div>
                    <div class="detail-value"><span class="tag tag-${merchant.type}">${typeMap[merchant.type]}</span></div>
                  </div>
                  <div class="detail-row">
                    <div class="detail-label">联系人</div>
                    <div class="detail-value">${merchant.contact_name}</div>
                  </div>
                  <div class="detail-row">
                    <div class="detail-label">联系电话</div>
                    <div class="detail-value">${merchant.phone}</div>
                  </div>
                  <div class="detail-row">
                    <div class="detail-label">地址</div>
                    <div class="detail-value">${merchant.address}</div>
                  </div>
                  <div class="detail-row">
                    <div class="detail-label">评分</div>
                    <div class="detail-value">${merchant.rating > 0 ? '⭐'.repeat(Math.floor(merchant.rating)) + ' ' + merchant.rating + '分' : '暂无评分'}</div>
                  </div>
                  <div class="detail-row">
                    <div class="detail-label">累计销量</div>
                    <div class="detail-value">${merchant.sales} 单</div>
                  </div>
                  <div class="detail-row">
                    <div class="detail-label">注册时间</div>
                    <div class="detail-value">${formatTime(merchant.created_at)}</div>
                  </div>
                  <div class="detail-row">
                    <div class="detail-label">状态</div>
                    <div class="detail-value"><span class="tag tag-${merchant.status === 1 ? 'success' : merchant.status === 0 ? 'warning' : 'danger'}">${statusMap[merchant.status]}</span></div>
                  </div>
                </div>
                <div class="modal-footer">
                  <button class="table-btn" onclick="closeModal()">关闭</button>
                  ${merchant.status === 0 ? `<button class="table-btn primary">通过审核</button>` : ''}
                </div>
              </div>
            </div>
          `
        }
      } else if (state.modal === 'order') {
        const order = state.orders.find(o => o.id === state.modalData)
        if (order) {
          modalContent = `
            <div class="modal-overlay" onclick="if(event.target===this)closeModal()">
              <div class="modal-content">
                <div class="modal-header">
                  <div class="modal-title">📋 订单详情</div>
                  <div class="modal-close" onclick="closeModal()">&times;</div>
                </div>
                <div class="modal-body">
                  <div class="detail-row">
                    <div class="detail-label">订单号</div>
                    <div class="detail-value"><strong>${order.order_no}</strong></div>
                  </div>
                  <div class="detail-row">
                    <div class="detail-label">商品/服务</div>
                    <div class="detail-value">${order.product_name}</div>
                  </div>
                  <div class="detail-row">
                    <div class="detail-label">客户姓名</div>
                    <div class="detail-value">${order.customer}</div>
                  </div>
                  <div class="detail-row">
                    <div class="detail-label">联系电话</div>
                    <div class="detail-value">${order.phone}</div>
                  </div>
                  <div class="detail-row">
                    <div class="detail-label">订单金额</div>
                    <div class="detail-value"><strong style="color:#E8885A;font-size:18px">¥${order.total_price}</strong></div>
                  </div>
                  <div class="detail-row">
                    <div class="detail-label">入住/使用日期</div>
                    <div class="detail-value">${order.check_in !== '-' ? formatDate(order.check_in) + ' 至 ' + formatDate(order.check_out) : '即时消费'}</div>
                  </div>
                  <div class="detail-row">
                    <div class="detail-label">入住人数</div>
                    <div class="detail-value">${order.guests} 人</div>
                  </div>
                  <div class="detail-row">
                    <div class="detail-label">下单时间</div>
                    <div class="detail-value">${formatTime(order.created_at)}</div>
                  </div>
                  <div class="detail-row">
                    <div class="detail-label">订单状态</div>
                    <div class="detail-value"><span class="tag tag-${orderStatusClass[order.status]}">${orderStatusMap[order.status]}</span></div>
                  </div>
                </div>
                <div class="modal-footer">
                  <button class="table-btn" onclick="closeModal()">关闭</button>
                  ${order.status === 'pending' ? `<button class="table-btn primary">确认订单</button>` : ''}
                  ${order.status === 'paid' ? `<button class="table-btn primary">完成订单</button>` : ''}
                </div>
              </div>
            </div>
          `
        }
      } else if (state.modal === 'user') {
        const user = state.users.find(u => u.id === state.modalData)
        if (user) {
          modalContent = `
            <div class="modal-overlay" onclick="if(event.target===this)closeModal()">
              <div class="modal-content">
                <div class="modal-header">
                  <div class="modal-title">👤 会员详情</div>
                  <div class="modal-close" onclick="closeModal()">&times;</div>
                </div>
                <div class="modal-body">
                  <div class="detail-row">
                    <div class="detail-label">会员姓名</div>
                    <div class="detail-value"><strong>${user.name}</strong></div>
                  </div>
                  <div class="detail-row">
                    <div class="detail-label">手机号</div>
                    <div class="detail-value">${user.phone}</div>
                  </div>
                  <div class="detail-row">
                    <div class="detail-label">邮箱</div>
                    <div class="detail-value">${user.email}</div>
                  </div>
                  <div class="detail-row">
                    <div class="detail-label">会员等级</div>
                    <div class="detail-value"><span class="tag tag-${user.level === '钻石' ? 'purple' : user.level === '金牌' ? 'warning' : 'info'}">${user.level}</span></div>
                  </div>
                  <div class="detail-row">
                    <div class="detail-label">订单数量</div>
                    <div class="detail-value">${user.orders} 单</div>
                  </div>
                  <div class="detail-row">
                    <div class="detail-label">消费总额</div>
                    <div class="detail-value"><strong style="color:#E8885A">¥${user.total.toLocaleString()}</strong></div>
                  </div>
                  <div class="detail-row">
                    <div class="detail-label">注册时间</div>
                    <div class="detail-value">${user.joined}</div>
                  </div>
                  <div class="detail-row">
                    <div class="detail-label">账号状态</div>
                    <div class="detail-value"><span class="tag tag-${user.status === 'active' ? 'success' : 'danger'}">${user.status === 'active' ? '正常' : '冻结'}</span></div>
                  </div>
                </div>
                <div class="modal-footer">
                  <button class="table-btn" onclick="closeModal()">关闭</button>
                  <button class="table-btn primary">编辑资料</button>
                </div>
              </div>
            </div>
          `
        }
      } else if (state.modal === 'room-edit') {
        const room = state.rooms.find(r => r.id === state.modalData)
        if (room) {
          modalContent = `
            <div class="modal-overlay" onclick="if(event.target===this)closeModal()">
              <div class="modal-content" style="max-width:600px">
                <div class="modal-header">
                  <div class="modal-title">🏨 编辑房型</div>
                  <div class="modal-close" onclick="closeModal()">&times;</div>
                </div>
                <div class="modal-body">
                  <div class="detail-row">
                    <div class="detail-label">房型名称</div>
                    <div class="detail-value"><input type="text" class="filter-input" value="${room.name}" style="width:200px"></div>
                  </div>
                  <div class="detail-row">
                    <div class="detail-label">所属商家</div>
                    <div class="detail-value"><select class="filter-select"><option>${room.merchant}</option></select></div>
                  </div>
                  <div class="detail-row">
                    <div class="detail-label">房间类型</div>
                    <div class="detail-value"><select class="filter-select"><option>${roomTypeMap[room.type]}</option></select></div>
                  </div>
                  <div class="detail-row">
                    <div class="detail-label">价格(元/晚)</div>
                    <div class="detail-value"><input type="number" class="filter-input" value="${room.price}" style="width:120px"></div>
                  </div>
                  <div class="detail-row">
                    <div class="detail-label">房间数量</div>
                    <div class="detail-value"><input type="number" class="filter-input" value="${room.total}" style="width:100px"></div>
                  </div>
                  <div class="detail-row">
                    <div class="detail-label">房间设施</div>
                    <div class="detail-value">
                      <label style="margin-right:16px"><input type="checkbox" checked> WiFi</label>
                      <label style="margin-right:16px"><input type="checkbox" checked> 空调</label>
                      <label style="margin-right:16px"><input type="checkbox" checked> 独立卫浴</label>
                      <label style="margin-right:16px"><input type="checkbox" checked> 电视</label>
                    </div>
                  </div>
                  <div class="detail-row">
                    <div class="detail-label">房间面积</div>
                    <div class="detail-value"><input type="text" class="filter-input" value="25-35㎡" style="width:120px"></div>
                  </div>
                  <div class="detail-row">
                    <div class="detail-label">床型</div>
                    <div class="detail-value"><input type="text" class="filter-input" value="1.8m大床 × 1" style="width:150px"></div>
                  </div>
                  <div class="detail-row">
                    <div class="detail-label">入住人数</div>
                    <div class="detail-value"><input type="number" class="filter-input" value="2" style="width:80px"> 人</div>
                  </div>
                  <div class="detail-row">
                    <div class="detail-label">状态</div>
                    <div class="detail-value">
                      <select class="filter-select" style="width:120px">
                        <option value="available" ${room.status === 'available' ? 'selected' : ''}>可预订</option>
                        <option value="maintenance" ${room.status === 'maintenance' ? 'selected' : ''}>维护中</option>
                      </select>
                    </div>
                  </div>
                </div>
                <div class="modal-footer">
                  <button class="table-btn" onclick="closeModal()">取消</button>
                  <button class="table-btn primary" onclick="saveRoom()">保存修改</button>
                </div>
              </div>
            </div>
          `
        }
      } else if (state.modal === 'room-status') {
        const room = state.rooms.find(r => r.id === state.modalData)
        if (room) {
          const roomNumbers = Array.from({length: room.total}, (_, i) => i + 101)
          modalContent = `
            <div class="modal-overlay" onclick="if(event.target===this)closeModal()">
              <div class="modal-content" style="max-width:700px">
                <div class="modal-header">
                  <div class="modal-title">🏨 房态管理 - ${room.name}</div>
                  <div class="modal-close" onclick="closeModal()">&times;</div>
                </div>
                <div class="modal-body">
                  <div style="display:grid;grid-template-columns:repeat(5,1fr);gap:12px">
                    ${roomNumbers.map((num, i) => {
                      const status = i < room.occupancy ? 'occupied' : i < room.occupancy + 2 ? 'cleaning' : i === room.total - 1 ? 'maintenance' : 'available'
                      const statusText = status === 'occupied' ? '已入住' : status === 'cleaning' ? '清洁中' : status === 'maintenance' ? '维修中' : '可预订'
                      const statusClass = status === 'occupied' ? 'danger' : status === 'cleaning' ? 'warning' : status === 'maintenance' ? 'info' : 'success'
                      return `
                        <div style="border:1px solid #e0e0e0;border-radius:8px;padding:12px;text-align:center;background:${status === 'occupied' ? '#FFF5F5' : status === 'cleaning' ? '#FFFAF0' : status === 'maintenance' ? '#F0F8FF' : '#F0FFF0'}">
                          <div style="font-weight:bold;margin-bottom:6px">${num}</div>
                          <span class="tag tag-${statusClass}" style="font-size:11px">${statusText}</span>
                          <select class="filter-select" style="margin-top:8px;font-size:12px;width:100%" onchange="this.previousElementSibling.previousElementSibling.textContent=this.options[this.selectedIndex].textContent;this.previousElementSibling.className='tag tag-'+this.options[this.selectedIndex].className.split('tag-')[1]">
                            <option value="available" class="tag tag-success" ${status === 'available' ? 'selected' : ''}>可预订</option>
                            <option value="occupied" class="tag tag-danger" ${status === 'occupied' ? 'selected' : ''}>已入住</option>
                            <option value="cleaning" class="tag tag-warning" ${status === 'cleaning' ? 'selected' : ''}>清洁中</option>
                            <option value="maintenance" class="tag tag-info" ${status === 'maintenance' ? 'selected' : ''}>维修中</option>
                          </select>
                        </div>
                      `
                    }).join('')}
                  </div>
                </div>
                <div class="modal-footer">
                  <button class="table-btn" onclick="closeModal()">关闭</button>
                  <button class="table-btn primary" onclick="saveRoomStatus()">保存房态</button>
                </div>
              </div>
            </div>
          `
        }
      }
      
      return modalContent
    }
    
    // ====== 导出功能 ======
    function exportData(type) {
      alert(`正在导出${type}数据...\n（演示功能，实际项目中会生成Excel/CSV文件下载）`)
    }
    
    // ====== 房型管理功能 ======
    function openRoomModal(id) {
      state.modal = 'room-edit'
      state.modalData = id
      render()
    }
    
    function openRoomStatus(id) {
      state.modal = 'room-status'
      state.modalData = id
      render()
    }
    
    function saveRoom() {
      alert('房型信息已保存！')
      closeModal()
      render()
    }
    
    function saveRoomStatus() {
      alert('房态信息已保存！')
      closeModal()
      render()
    }
    
    // ====== 初始化 ======
    render()
    if (state.logged) loadDashboard()
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>丽江本地生活 - 后台管理</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif; background: #f0f2f5; }
    
    /* 登录页 */
    .login-page { height: 100vh; display: flex; align-items: center; justify-content: center; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }
    .login-card { background: #fff; padding: 40px; border-radius: 12px; width: 400px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); }
    .login-title { text-align: center; font-size: 24px; font-weight: bold; color: #333; margin-bottom: 8px; }
    .login-sub { text-align: center; color: #999; margin-bottom: 30px; font-size: 14px; }
    .login-form { display: flex; flex-direction: column; gap: 16px; }
    .form-item { display: flex; align-items: center; background: #f5f7fa; border-radius: 8px; padding: 0 12px; border: 2px solid transparent; transition: all 0.2s; }
    .form-item:focus-within { border-color: #E8885A; background: #fff; }
    .input-icon { font-size: 18px; margin-right: 8px; flex-shrink: 0; }
    .native-input { flex: 1; height: 48px; border: none; background: transparent; font-size: 15px; outline: none; color: #333; }
    .native-input::placeholder { color: #999; }
    .login-btn { width: 100%; height: 48px; background: linear-gradient(135deg, #E8885A, #D46B6B); border: none; border-radius: 8px; color: #fff; font-size: 16px; font-weight: 500; cursor: pointer; transition: opacity 0.2s; }
    .login-btn:hover { opacity: 0.9; }
    .login-btn:disabled { opacity: 0.6; cursor: not-allowed; }
    .login-hint { text-align: center; color: #ccc; font-size: 12px; margin-top: 16px; }
    .error-msg { color: #f56c6c; font-size: 13px; text-align: center; margin-top: 8px; }
    
    /* 后台主界面 */
    .layout { display: flex; height: 100vh; }
    .sidebar { width: 220px; background: #1a1a2e; color: #fff; overflow-y: auto; flex-shrink: 0; display: flex; flex-direction: column; }
    .sidebar-logo { padding: 20px; text-align: center; border-bottom: 1px solid rgba(255,255,255,0.1); }
    .sidebar-logo h2 { font-size: 16px; color: #E8885A; }
    .sidebar-logo p { font-size: 11px; color: rgba(255,255,255,0.5); margin-top: 4px; }
    .sidebar-menu { flex: 1; overflow-y: auto; }
    .menu-item { padding: 14px 24px; cursor: pointer; transition: all 0.2s; display: flex; align-items: center; gap: 10px; font-size: 14px; color: rgba(255,255,255,0.7); }
    .menu-item:hover { background: rgba(255,255,255,0.08); color: #fff; }
    .menu-item.active { background: rgba(232,136,90,0.2); color: #E8885A; border-right: 3px solid #E8885A; }
    .menu-icon { font-size: 18px; }
    .main-content { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
    .top-bar { height: 60px; background: #fff; display: flex; align-items: center; justify-content: space-between; padding: 0 24px; box-shadow: 0 1px 4px rgba(0,0,0,0.08); }
    .top-bar h3 { font-size: 18px; color: #333; }
    .top-bar-right { display: flex; align-items: center; gap: 12px; }
    .top-bar-time { color: #999; font-size: 13px; }
    .top-bar-btn { padding: 6px 12px; background: #f5f7fa; border: none; border-radius: 4px; cursor: pointer; font-size: 13px; }
    .top-bar-btn:hover { background: #e4e7ed; }
    .top-bar-btn.logout { color: #f56c6c; }
    .content-area { flex: 1; padding: 20px; overflow-y: auto; }
    
    /* 统计卡片 */
    .stat-cards { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 20px; }
    .stat-card { background: #fff; border-radius: 12px; padding: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.04); }
    .stat-label { font-size: 13px; color: #999; }
    .stat-value { font-size: 28px; font-weight: bold; color: #333; margin-top: 8px; }
    .stat-extra { font-size: 12px; color: #E8885A; margin-top: 4px; }
    .stat-card.blue .stat-value { color: #4A90B8; }
    .stat-card.green .stat-value { color: #6AAF7C; }
    .stat-card.purple .stat-value { color: #8B7EC8; }
    .stat-card.red .stat-value { color: #D46B6B; }
    
    /* 表格 */
    .table-card { background: #fff; border-radius: 12px; padding: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.04); }
    .table-title { font-size: 16px; margin-bottom: 16px; display: flex; justify-content: space-between; align-items: center; }
    .table-filters { display: flex; gap: 8px; flex-wrap: wrap; }
    .table-filter { padding: 6px 12px; border: 1px solid #dcdfe6; border-radius: 4px; background: #fff; font-size: 13px; cursor: pointer; }
    .table-filter.active { border-color: #E8885A; color: #E8885A; background: #FDF6F4; }
    .table { width: 100%; border-collapse: collapse; }
    .table th, .table td { padding: 12px; text-align: left; border-bottom: 1px solid #f0f0f0; font-size: 14px; }
    .table th { color: #606266; font-weight: 500; background: #fafafa; }
    .table tr:hover { background: #f5f7fa; }
    .tag { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 12px; }
    .tag-hotel { background: #E8F4FD; color: #007AFF; }
    .tag-food { background: #FFF3ED; color: #E8885A; }
    .tag-travel { background: #E8F8E8; color: #6AAF7C; }
    .tag-product { background: #F0F0FF; color: #8B7EC8; }
    .tag-warning { background: #FFF4E8; color: #E6A23C; }
    .tag-success { background: #E8F8E8; color: #67C23A; }
    .tag-danger { background: #FDF2F2; color: #F56C6C; }
    .tag-info { background: #F4F4F5; color: #909399; }
    .table-actions { display: flex; gap: 8px; flex-wrap: wrap; }
    .action-btn { padding: 4px 12px; border-radius: 4px; font-size: 12px; cursor: pointer; border: none; }
    .action-btn.success { background: #67C23A; color: #fff; }
    .action-btn.danger { background: #F56C6C; color: #fff; }
    .action-btn.warning { background: #E6A23C; color: #fff; }
    .action-btn:hover { opacity: 0.8; }
    .empty-state { text-align: center; padding: 60px; color: #999; }
    .pagination { margin-top: 16px; display: flex; justify-content: flex-end; gap: 8px; }
    .page-btn { padding: 6px 12px; border: 1px solid #dcdfe6; background: #fff; border-radius: 4px; cursor: pointer; font-size: 13px; }
    .page-btn:hover { border-color: #E8885A; color: #E8885A; }
    .page-btn.active { background: #E8885A; color: #fff; border-color: #E8885A; }
    
    /* 设置页面 */
    .setting-section { background: #fff; border-radius: 12px; padding: 24px; margin-bottom: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.04); }
    .setting-section h4 { margin-bottom: 16px; font-size: 15px; }
    .setting-list { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; }
    .setting-item { padding: 12px; background: #f9f9f9; border-radius: 6px; font-size: 13px; }
    .setting-item .name { color: #333; font-weight: 500; }
    .setting-item .desc { color: #999; font-size: 12px; margin-top: 4px; }
    .setting-item .side { color: #E8885A; font-size: 11px; }
  </style>
</head>
<body>
  <div id="app"></div>
  
  <script>
    // ====== 配置 ======
    const SUPABASE_URL = 'https://snbttutvgdocjpbbuznc.supabase.co'
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNuYnR0dXR2Z2RvY2pwYmJ1em5jIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NDQ1MTc1MDYsImV4cCI6MjA2MDA5MzUwNn0.FFEayHdfC5vXxZJLNJKHvg_Tjy_eGNXBpeB7W3vSFPY'
    
    // ====== 全局状态 ======
    const state = {
      logged: !!localStorage.getItem('admin_token'),
      currentPage: 'dashboard',
      loginForm: { username: '', password: '' },
      loginLoading: false,
      loginError: '',
      currentTime: '',
      dashboard: { totalStores: 0, totalOrders: 0, totalUsers: 0, todayRevenue: 0, pendingMerchants: 0, pendingOrders: 0, productCount: 0 },
      merchants: [],
      merchantsPage: 1,
      merchantsTotal: 0,
      orders: [],
      ordersPage: 1,
      ordersTotal: 0,
      settingsCollapsed: false
    }
    
    // ====== 菜单配置 ======
    const menuItems = [
      { key: 'dashboard', icon: '📊', label: '数据概览' },
      { key: 'merchants', icon: '🏪', label: '商家管理' },
      { key: 'orders', icon: '📋', label: '订单管理' },
      { key: 'stores', icon: '🏨', label: '店铺管理' },
      { key: 'products', icon: '🎁', label: '商品管理' },
      { key: 'banners', icon: '🖼️', label: '轮播图管理' },
      { key: 'reviews', icon: '⭐', label: '评价管理' },
      { key: 'users', icon: '👤', label: '用户管理' },
      { key: 'settings', icon: '⚙️', label: '系统设置' }
    ]
    
    const typeMap = { hotel: '酒店民宿', food: '美食', travel: '游玩', product: '特产' }
    const statusMap = { 0: '待审核', 1: '已通过', 2: '已禁用', 3: '已拒绝' }
    const orderStatusMap = { pending: '待处理', paid: '已支付', completed: '已完成', cancelled: '已取消' }
    const orderStatusClass = { pending: 'warning', paid: 'success', completed: 'info', cancelled: 'danger' }
    
    // ====== 工具函数 ======
    function formatTime(date) {
      if (!date) return '-'
      const d = new Date(date)
      if (isNaN(d.getTime())) return String(date)
      const y = d.getFullYear()
      const m = String(d.getMonth() + 1).padStart(2, '0')
      const day = String(d.getDate()).padStart(2, '0')
      const h = String(d.getHours()).padStart(2, '0')
      const min = String(d.getMinutes()).padStart(2, '0')
      return `${y}-${m}-${day} ${h}:${min}`
    }
    
    function updateTime() {
      state.currentTime = new Date().toLocaleString('zh-CN')
    }
    setInterval(updateTime, 1000)
    updateTime()
    
    // ====== 登录 ======
    function doLogin() {
      const { username, password } = state.loginForm
      if (!username || !password) {
        state.loginError = '请输入用户名和密码'
        return
      }
      state.loginLoading = true
      state.loginError = ''
      
      // 模拟登录过程
      setTimeout(() => {
        if (username === 'admin' && password === 'admin123') {
          localStorage.setItem('admin_token', 'admin-login-success')
          state.logged = true
          alert('登录成功！')
          loadDashboard()
          render()
        } else {
          state.loginError = '用户名或密码错误'
        }
        state.loginLoading = false
      }, 800)
    }
    
    function doLogout() {
      localStorage.removeItem('admin_token')
      state.logged = false
      state.currentPage = 'dashboard'
      render()
    }
    
    function goPage(key) {
      state.currentPage = key
      render()
      if (key === 'dashboard') loadDashboard()
      else if (key === 'merchants') loadMerchants()
      else if (key === 'orders') loadOrders()
    }
    
    // ====== 数据加载 ======
    async function loadDashboard() {
      // 显示加载状态
      state.dashboard = { totalStores: '-', totalOrders: '-', totalUsers: '-', todayRevenue: '-', pendingMerchants: '-', pendingOrders: '-', productCount: '-' }
      render()
    }
    
    async function loadMerchants() {
      state.merchants = []
      state.merchantsTotal = 0
      render()
    }
    
    async function loadOrders() {
      state.orders = []
      state.ordersTotal = 0
      render()
    }
    
    // ====== 渲染函数 ======
    function render() {
      const app = document.getElementById('app')
      
      if (!state.logged) {
        // 登录页面
        app.innerHTML = `
          <div class="login-page">
            <div class="login-card">
              <div class="login-title">🏔️ 丽江本地生活</div>
              <div class="login-sub">后台管理系统</div>
              <div class="login-form">
                <div class="form-item">
                  <span class="input-icon">👤</span>
                  <input type="text" class="native-input" placeholder="用户名" value="${state.loginForm.username}" oninput="state.loginForm.username = this.value">
                </div>
                <div class="form-item">
                  <span class="input-icon">🔒</span>
                  <input type="password" class="native-input" placeholder="密码" value="${state.loginForm.password}" oninput="state.loginForm.password = this.value" onkeyup="if(event.key==='Enter')doLogin()">
                </div>
                <button class="login-btn" ${state.loginLoading ? 'disabled' : ''} onclick="doLogin()">
                  ${state.loginLoading ? '登录中...' : '登录'}
                </button>
                ${state.loginError ? `<div class="error-msg">${state.loginError}</div>` : ''}
              </div>
              <div class="login-hint">默认: admin / admin123</div>
            </div>
          </div>
        `
      } else {
        // 主界面
        const currentMenu = menuItems.find(m => m.key === state.currentPage) || menuItems[0]
        
        let contentHTML = ''
        
        if (state.currentPage === 'dashboard') {
          contentHTML = `
            <div class="stat-cards">
              <div class="stat-card">
                <div class="stat-label">总商家数</div>
                <div class="stat-value">${state.dashboard.totalStores}</div>
                <div class="stat-extra">🏪</div>
              </div>
              <div class="stat-card blue">
                <div class="stat-label">总订单数</div>
                <div class="stat-value">${state.dashboard.totalOrders}</div>
                <div class="stat-extra">近7天 ${state.dashboard.weekOrders || 0} 单</div>
              </div>
              <div class="stat-card green">
                <div class="stat-label">总用户数</div>
                <div class="stat-value">${state.dashboard.totalUsers}</div>
                <div class="stat-extra">👤</div>
              </div>
              <div class="stat-card purple">
                <div class="stat-label">今日营收</div>
                <div class="stat-value">¥${state.dashboard.todayRevenue}</div>
                <div class="stat-extra">今日 ${state.dashboard.todayOrders || 0} 单</div>
              </div>
            </div>
            <div class="stat-cards">
              <div class="stat-card red">
                <div class="stat-label">待审核商家</div>
                <div class="stat-value">${state.dashboard.pendingMerchants}</div>
              </div>
              <div class="stat-card">
                <div class="stat-label">待处理订单</div>
                <div class="stat-value">${state.dashboard.pendingOrders}</div>
              </div>
              <div class="stat-card green">
                <div class="stat-label">上架商品数</div>
                <div class="stat-value">${state.dashboard.productCount}</div>
              </div>
            </div>
          `
        } else if (state.currentPage === 'merchants') {
          if (state.merchants.length === 0) {
            contentHTML = `
              <div class="table-card">
                <div class="table-title">商家管理</div>
                <div class="empty-state">
                  <p>暂无商家数据</p>
                  <p style="margin-top:8px;font-size:12px">商家数据将从丽江本地生活小程序同步</p>
                </div>
              </div>
            `
          } else {
            contentHTML = `
              <div class="table-card">
                <div class="table-title">
                  <span>商家管理</span>
                </div>
                <table class="table">
                  <thead>
                    <tr>
                      <th>店铺名称</th>
                      <th>类型</th>
                      <th>联系人</th>
                      <th>电话</th>
                      <th>状态</th>
                      <th>注册时间</th>
                      <th>操作</th>
                    </tr>
                  </thead>
                  <tbody>
                    ${state.merchants.map(m => `
                      <tr>
                        <td>${m.name || '-'}</td>
                        <td><span class="tag tag-${m.type}">${typeMap[m.type] || m.type}</span></td>
                        <td>${m.contact_name || '-'}</td>
                        <td>${m.phone || '-'}</td>
                        <td><span class="tag tag-${m.status === 1 ? 'success' : m.status === 0 ? 'warning' : 'danger'}">${statusMap[m.status] || m.status}</span></td>
                        <td>${formatTime(m.created_at)}</td>
                        <td>
                          <div class="table-actions">
                            <button class="action-btn success" onclick="auditMerchant(${m.id}, 1)">通过</button>
                            <button class="action-btn danger" onclick="auditMerchant(${m.id}, 3)">拒绝</button>
                          </div>
                        </td>
                      </tr>
                    `).join('')}
                  </tbody>
                </table>
              </div>
            `
          }
        } else if (state.currentPage === 'orders') {
          if (state.orders.length === 0) {
            contentHTML = `
              <div class="table-card">
                <div class="table-title">订单管理</div>
                <div class="empty-state">
                  <p>暂无订单数据</p>
                  <p style="margin-top:8px;font-size:12px">订单数据将从丽江本地生活小程序同步</p>
                </div>
              </div>
            `
          } else {
            contentHTML = `
              <div class="table-card">
                <div class="table-title">订单管理</div>
                <table class="table">
                  <thead>
                    <tr>
                      <th>订单号</th>
                      <th>商品</th>
                      <th>金额</th>
                      <th>状态</th>
                      <th>时间</th>
                    </tr>
                  </thead>
                  <tbody>
                    ${state.orders.map(o => `
                      <tr>
                        <td>${o.order_no || '-'}</td>
                        <td>${o.product_name || '-'}</td>
                        <td>¥${o.total_price || 0}</td>
                        <td><span class="tag tag-${orderStatusClass[o.status] || 'info'}">${orderStatusMap[o.status] || o.status}</span></td>
                        <td>${formatTime(o.created_at)}</td>
                      </tr>
                    `).join('')}
                  </tbody>
                </table>
              </div>
            `
          }
        } else if (state.currentPage === 'settings') {
          contentHTML = `
            <div class="setting-section">
              <h4>📦 数据库表结构</h4>
              <div class="setting-list">
                <div class="setting-item">
                  <div class="name">users</div>
                  <div class="desc">用户信息</div>
                  <div class="side">用户端</div>
                </div>
                <div class="setting-item">
                  <div class="name">merchants</div>
                  <div class="desc">商户账号</div>
                  <div class="side">商户端</div>
                </div>
                <div class="setting-item">
                  <div class="name">stores</div>
                  <div class="desc">店铺信息</div>
                  <div class="side">商户端写/用户端读</div>
                </div>
                <div class="setting-item">
                  <div class="name">orders</div>
                  <div class="desc">订单</div>
                  <div class="side">双端读写</div>
                </div>
                <div class="setting-item">
                  <div class="name">products</div>
                  <div class="desc">特产商品</div>
                  <div class="side">商户端写/用户端读</div>
                </div>
                <div class="setting-item">

                  <div class="desc">首页轮播图</div>

                </div>
                <div class="setting-item">
                  <div class="name">reviews</div>
                  <div class="desc">评价</div>
                  <div class="side">用户端写/商户端读</div>
                </div>
                <div class="setting-item">
                  <div class="name">coupons</div>
                  <div class="desc">优惠券</div>
                  <div class="side">管理后台</div>
                </div>
              </div>
            </div>
            <div class="setting-section">
              <h4>ℹ️ 系统信息</h4>
              <div class="setting-list">
                <div class="setting-item">
                  <div class="name">版本</div>
                  <div class="desc">v2.0 纯前端版</div>
                </div>
                <div class="setting-item">
                  <div class="name">技术栈</div>
                  <div class="desc">原生 JavaScript + Supabase</div>
                </div>
                <div class="setting-item">
                  <div class="name">部署平台</div>
                  <div class="desc">Netlify</div>
                </div>
                <div class="setting-item">
                  <div class="name">数据存储</div>
                  <div class="desc">Supabase PostgreSQL</div>
                </div>
              </div>
            </div>
          `
        } else {
          contentHTML = `
            <div class="table-card">
              <div class="empty-state">
                <p>${currentMenu.icon} ${currentMenu.label}</p>
                <p style="margin-top:8px;font-size:12px">该模块正在开发中...</p>
              </div>
            </div>
          `
        }
        
        app.innerHTML = `
          <div class="layout">
            <div class="sidebar">
              <div class="sidebar-logo">
                <h2>🏔️ 丽江本地生活</h2>
                <p>后台管理 v2.0</p>
              </div>
              <div class="sidebar-menu">
                ${menuItems.map(item => `
                  <div class="menu-item ${state.currentPage === item.key ? 'active' : ''}" onclick="goPage('${item.key}')">
                    <span class="menu-icon">${item.icon}</span>
                    <span>${item.label}</span>
                  </div>
                `).join('')}
              </div>
              <div style="padding:16px;border-top:1px solid rgba(255,255,255,0.1)">
                <div class="menu-item" onclick="doLogout()" style="color:#D46B6B">
                  <span class="menu-icon">🚪</span>
                  <span>退出登录</span>
                </div>
              </div>
            </div>
            <div class="main-content">
              <div class="top-bar">
                <h3>${currentMenu.icon} ${currentMenu.label}</h3>
                <div class="top-bar-right">
                  <span class="top-bar-time">${state.currentTime}</span>
                  <button class="top-bar-btn" onclick="goPage('dashboard')">🔄 刷新</button>
                  <button class="top-bar-btn logout" onclick="doLogout()">🚪 退出</button>
                </div>
              </div>
              <div class="content-area">
                ${contentHTML}
              </div>
            </div>
          </div>
        `
      }
    }
    
    // ====== 初始化 ======
    render()
  </script>
</body>

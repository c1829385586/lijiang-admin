    .login-form { display: flex; flex-direction: column; gap: 16px; }
    .form-item { display: flex; align-items: center; background: #f5f7fa; border-radius: 8px; padding: 0 12px; border: 2px solid transparent; transition: all 0.2s; }
    .form-item:focus-within { border-color: #E8885A; background: #fff; }
    .input-icon { font-size: 18px; margin-right: 8px; flex-shrink: 0; }
    .native-input { flex: 1; height: 48px; border: none; background: transparent; font-size: 15px; outline: none; color: #333; }
    .native-input::placeholder { color: #999; }
    .login-btn { width: 100%; height: 48px; background: linear-gradient(135deg, #E8885A, #D46B6B); border: none; border-radius: 8px; color: #fff; font-size: 16px; font-weight: 500; cursor: pointer; transition: opacity 0.2s; }
    .login-btn:hover { opacity: 0.9; }
    .login-btn:disabled { opacity: 0.6; cursor: not-allowed; }
    .login-hint { text-align: center; color: #ccc; font-size: 12px; margin-top: 16px; }
    .error-msg { color: #f56c6c; font-size: 13px; text-align: center; margin-top: 8px; }
    
    /* 后台主界面 */
    .layout { display: flex; height: 100vh; }

    .sidebar-logo h2 { font-size: 16px; color: #E8885A; }
    .sidebar-logo p { font-size: 11px; color: rgba(255,255,255,0.5); margin-top: 4px; }
    .sidebar-menu { flex: 1; overflow-y: auto; }

    .menu-icon { font-size: 18px; }
    .main-content { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
    .top-bar { height: 60px; background: #fff; display: flex; align-items: center; justify-content: space-between; padding: 0 24px; box-shadow: 0 1px 4px rgba(0,0,0,0.08); }
    .top-bar h3 { font-size: 18px; color: #333; }
    .top-bar-right { display: flex; align-items: center; gap: 12px; }
    .top-bar-time { color: #999; font-size: 13px; }
    .top-bar-btn { padding: 6px 12px; background: #f5f7fa; border: none; border-radius: 4px; cursor: pointer; font-size: 13px; }
    .top-bar-btn:hover { background: #e4e7ed; }
    .top-bar-btn.logout { color: #f56c6c; }
    .content-area { flex: 1; padding: 20px; overflow-y: auto; }
    
    /* 统计卡片 - 可点击 */
    .stat-cards { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 20px; }
    .stat-card { background: #fff; border-radius: 12px; padding: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.04); cursor: pointer; transition: all 0.3s; position: relative; overflow: hidden; }
    .stat-card:hover { transform: translateY(-4px); box-shadow: 0 8px 24px rgba(0,0,0,0.12); }

    .stat-card:hover::after { opacity: 1; }
    .stat-label { font-size: 13px; color: #999; }

    .stat-card.purple .stat-value { color: #8B7EC8; }
    .stat-card.red .stat-value { color: #D46B6B; }
    .stat-card.orange .stat-value { color: #E8885A; }
    
    /* 图表区域 */

    .chart-title { font-size: 16px; font-weight: 500; margin-bottom: 16px; color: #333; }
    .chart-row { display: grid; grid-template-columns: 2fr 1fr; gap: 20px; }
    .chart-container { height: 300px; position: relative; }
    .chart-bar { display: flex; align-items: flex-end; justify-content: space-around; height: 250px; padding: 0 20px; }
    .chart-bar-item { display: flex; flex-direction: column; align-items: center; flex: 1; }
    .chart-bar-fill { width: 40px; background: linear-gradient(to top, #E8885A, #FFD4B8); border-radius: 4px 4px 0 0; transition: height 0.5s; position: relative; }

    .quick-action-icon { font-size: 28px; margin-bottom: 8px; }
    .quick-action-label { font-size: 13px; color: #666; }
    
    /* 表格 */

    .table-actions { display: flex; gap: 8px; }

    .table-btn:hover { border-color: #E8885A; color: #E8885A; }
    .table-btn.primary { background: #E8885A; color: #fff; border-color: #E8885A; }
    .table-btn.primary:hover { background: #D46B6B; }
    .table { width: 100%; border-collapse: collapse; }

    .tag-food { background: #FFF3ED; color: #E8885A; }
    .tag-travel { background: #E8F8E8; color: #6AAF7C; }
    .tag-product { background: #F0F0FF; color: #8B7EC8; }
    .tag-warning { background: #FFF4E8; color: #E6A23C; }
    .tag-success { background: #E8F8E8; color: #67C23A; }
    .tag-danger { background: #FDF2F2; color: #F56C6C; }
    .tag-info { background: #F4F4F5; color: #909399; }
    .tag-purple { background: #F0F0FF; color: #8B7EC8; }
    .row-actions { display: flex; gap: 8px; }
    .row-btn { padding: 4px 12px; border-radius: 4px; font-size: 12px; cursor: pointer; border: none; }
    .row-btn.success { background: #67C23A; color: #fff; }
    .row-btn.danger { background: #F56C6C; color: #fff; }
    .row-btn.warning { background: #E6A23C; color: #fff; }

    .page-btn:hover { border-color: #E8885A; color: #E8885A; }

    /* 筛选器 */
    .filter-bar { display: flex; gap: 12px; margin-bottom: 16px; flex-wrap: wrap; }
    .filter-input { padding: 8px 12px; border: 1px solid #dcdfe6; border-radius: 4px; font-size: 13px; outline: none; }
    .filter-input:focus { border-color: #E8885A; }
    .filter-select { padding: 8px 12px; border: 1px solid #dcdfe6; border-radius: 4px; font-size: 13px; background: #fff; cursor: pointer; }
    
    /* 详情弹窗 */
    .modal-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); display: flex; align-items: center; justify-content: center; z-index: 1000; }
    .modal-content { background: #fff; border-radius: 12px; width: 600px; max-height: 80vh; overflow-y: auto; box-shadow: 0 20px 60px rgba(0,0,0,0.3); }
    .modal-header { padding: 20px; border-bottom: 1px solid #f0f0f0; display: flex; justify-content: space-between; align-items: center; }
    .modal-title { font-size: 18px; font-weight: 500; }
    .modal-close { font-size: 24px; cursor: pointer; color: #999; }
    .modal-close:hover { color: #333; }
    .modal-body { padding: 20px; }
    .detail-row { display: flex; padding: 10px 0; border-bottom: 1px solid #f5f5f5; }
    .detail-label { width: 120px; color: #999; font-size: 14px; }
    .detail-value { flex: 1; color: #333; font-size: 14px; }
    .modal-footer { padding: 16px 20px; border-top: 1px solid #f0f0f0; display: flex; justify-content: flex-end; gap: 12px; }
    
    /* 设置页面 */
    .setting-section { background: #fff; border-radius: 12px; padding: 24px; margin-bottom: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.04); }
    .setting-section h4 { margin-bottom: 16px; font-size: 16px; font-weight: 500; }
    .setting-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; }
    .setting-card { padding: 16px; background: #f9f9f9; border-radius: 8px; }
    .setting-card .name { color: #333; font-weight: 500; font-size: 14px; }
    .setting-card .desc { color: #999; font-size: 12px; margin-top: 4px; }
    .setting-card .side { color: #E8885A; font-size: 11px; margin-top: 8px; }
    
    /* 通知消息 */
    .notification-badge { position: relative; }
    .notification-badge::after { content: attr(data-count); position: absolute; top: -8px; right: -8px; background: #F56C6C; color: #fff; font-size: 10px; padding: 2px 6px; border-radius: 10px; }
    
    /* 趋势指示器 */
    .trend { display: inline-flex; align-items: center; gap: 4px; font-size: 12px; }
    .trend.up { color: #67C23A; }
    .trend.down { color: #F56C6C; }
    
    /* 进度条 */
    .progress-bar { width: 100%; height: 8px; background: #f0f0f0; border-radius: 4px; overflow: hidden; }
    .progress-fill { height: 100%; background: linear-gradient(90deg, #E8885A, #D46B6B); border-radius: 4px; transition: width 0.5s; }
    
    /* 标签页 */
    .tabs { display: flex; gap: 4px; margin-bottom: 16px; border-bottom: 2px solid #f0f0f0; }
    .tab { padding: 10px 20px; cursor: pointer; font-size: 14px; color: #666; border-bottom: 2px solid transparent; margin-bottom: -2px; }
    .tab:hover { color: #E8885A; }
    .tab.active { color: #E8885A; border-bottom-color: #E8885A; font-weight: 500; }
    
    /* 时间轴 */
    .timeline { position: relative; padding-left: 20px; }
    .timeline::before { content: ''; position: absolute; left: 5px; top: 0; bottom: 0; width: 2px; background: #e0e0e0; }
    .timeline-item { position: relative; padding-bottom: 20px; }
    .timeline-item::before { content: ''; position: absolute; left: -17px; top: 4px; width: 10px; height: 10px; background: #E8885A; border-radius: 50%; }
    .timeline-time { font-size: 12px; color: #999; }
    .timeline-content { font-size: 14px; color: #333; margin-top: 4px; }
    
    /* 响应式 */
    @media (max-width: 1200px) {
      .stat-cards { grid-template-columns: repeat(2, 1fr); }
      .chart-row { grid-template-columns: 1fr; }
      .quick-actions { grid-template-columns: repeat(3, 1fr); }
      .setting-grid { grid-template-columns: repeat(2, 1fr); }
    }
  </style>
</head>

    // ====== 菜单配置 ======
    const allMenuItems = [
      { key: 'dashboard', icon: '📊', label: '数据概览' },

    ]
    
    const typeMap = { hotel: '酒店民宿', food: '美食餐饮', travel: '旅游景点', product: '特产商品' }
    const statusMap = { 0: '待审核', 1: '已通过', 2: '已禁用', 3: '已拒绝' }
    const orderStatusMap = { pending: '待处理', paid: '已支付', completed: '已完成', cancelled: '已取消', refunded: '已退款' }
    const orderStatusClass = { pending: 'warning', paid: 'success', completed: 'info', cancelled: 'danger', refunded: 'purple' }
    const roomTypeMap = { standard: '标准间', deluxe: '豪华间', suite: '套房', family: '家庭房', single: '单人间' }
    const roomStatusMap = { available: '可预订', occupied: '已入住', cleaning: '清洁中', maintenance: '维修中' }
    
    // ====== 工具函数 ======
    function formatTime(date) {
      if (!date) return '-'
      const d = new Date(date)
      if (isNaN(d.getTime())) return String(date)
      const y = d.getFullYear()
      const m = String(d.getMonth() + 1).padStart(2, '0')
      const day = String(d.getDate()).padStart(2, '0')
      const h = String(d.getHours()).padStart(2, '0')
      const min = String(d.getMinutes()).padStart(2, '0')
      return `${y}-${m}-${day} ${h}:${min}`
    }
    
    function formatDate(date) {
      if (!date) return '-'
      const d = new Date(date)
      if (isNaN(d.getTime())) return String(date)
      return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`
    }
    
    function updateTime() {
      state.currentTime = new Date().toLocaleString('zh-CN')
    }
    setInterval(updateTime, 1000)
    updateTime()
    
    // ====== 登录 ======
    function doLogin() {
      const { username, password } = state.loginForm
      if (!username || !password) {
        state.loginError = '请输入用户名和密码'
        return render()
      }
      state.loginLoading = true
      state.loginError = ''
      render()
      
      setTimeout(() => {
        const account = accounts.find(a => a.username === username && a.password === password)
        if (account && account.status === 'active') {
          localStorage.setItem('admin_token', 'admin-login-success')
          localStorage.setItem('admin_user', JSON.stringify(account))
          state.logged = true
          state.currentUser = account
          state.loginLoading = false
          loadDashboard()
          render()
        } else if (account && account.status !== 'active') {
          state.loginLoading = false
          state.loginError = '账号已被禁用，请联系管理员'
          render()
        } else {
          state.loginLoading = false
          state.loginError = '用户名或密码错误'
          render()
        }
      }, 800)
    }
    
    function doLogout() {
      localStorage.removeItem('admin_token')
      localStorage.removeItem('admin_user')
      state.logged = false
      state.currentUser = null
      state.currentPage = 'dashboard'
      render()
    }
    
    function getUserMenuItems() {
      if (!state.currentUser) return []
      const role = roles[state.currentUser.role]
      if (!role) return []
      return allMenuItems.filter(item => role.permissions.includes(item.key))
    }
    
    function hasPermission(page) {
      if (!state.currentUser) return false
      const role = roles[state.currentUser.role]
      if (!role) return false
      return role.permissions.includes(page)
    }
    
    function goPage(key) {
      state.currentPage = key
      state.activeTab = 'all'
      render()
      if (key === 'dashboard') loadDashboard()
      else if (key === 'merchants') loadMerchants()
      else if (key === 'orders') loadOrders()
      else if (key === 'rooms') loadRooms()
      else if (key === 'users') loadUsers()
      else if (key === 'reviews') loadReviews()
      else if (key === 'notifications') loadNotifications()

      localStorage.setItem('admin_notifications', JSON.stringify(state.notifications))
    }
    
    function clickNotification(id) {
      const notif = state.notifications.find(n => n.id === id)
      if (!notif) return
      
      // 标记为已读
      notif.read = true
      saveNotifications()
      
      // 根据通知类型跳转到对应页面
      const title = notif.title
      if (title.includes('订单') || title.includes('新订单') || title.includes('退款')) {
        // 跳转到订单管理
        goPage('orders')
        // 打开订单详情
        setTimeout(() => {
          const order = state.orders[0] // 默认打开第一个订单
          if (order) {
            state.modal = 'order'
            state.modalData = order.id
            render()
          }
        }, 100)
      } else if (title.includes('商家') || title.includes('入驻') || title.includes('审核')) {
        // 跳转到商家管理
        goPage('merchants')
      } else if (title.includes('会员') || title.includes('用户')) {
        // 跳转到会员管理
        goPage('users')
      } else if (title.includes('评价') || title.includes('投诉')) {
        // 跳转到评价管理
        goPage('reviews')
      } else if (title.includes('财务')) {
        // 跳转到财务报表
        goPage('finance')
      } else {
        // 默认刷新当前页面
        render()
      }
    }

                      <option value="customer_service">客服人员</option>
                    </select>
                  </div>
                </div>
                <div class="detail-row">
                  <div class="detail-label">手机号</div>
                  <div class="detail-value"><input type="tel" id="acc-phone" class="filter-input" placeholder="手机号码" style="width:150px"></div>
                </div>
                <div class="detail-row">
                  <div class="detail-label">邮箱</div>
                  <div class="detail-value"><input type="email" id="acc-email" class="filter-input" placeholder="邮箱地址" style="width:200px"></div>
                </div>
              </div>
              <div class="modal-footer">
                <button class="table-btn" onclick="closeModal()">取消</button>
                <button class="table-btn primary" onclick="setTimeout(saveNewAccount, 50)">添加账号</button>
              </div>
            </div>
          </div>
        `
      } else if (state.modal === 'edit-account') {
        const account = accounts.find(a => a.id === state.modalData)
        if (account) {
          modalContent = `
            <div class="modal-overlay" onclick="if(event.target===this)closeModal()">
              <div class="modal-content" style="max-width:500px">
                <div class="modal-header">
                  <div class="modal-title">✏️ 编辑账号</div>
                  <div class="modal-close" onclick="closeModal()">&times;</div>
                </div>
                <div class="modal-body">
                  <div class="detail-row">
                    <div class="detail-label">用户名</div>
                    <div class="detail-value"><strong>${account.username}</strong></div>
                  </div>
                  <div class="detail-row">
                    <div class="detail-label"><span style="color:red">*</span>姓名</div>
                    <div class="detail-value"><input type="text" id="edit-acc-name" class="filter-input" value="${account.name}" style="width:150px"></div>
                  </div>
                  <div class="detail-row">
                    <div class="detail-label"><span style="color:red">*</span>角色</div>
                    <div class="detail-value">
                      <select id="edit-acc-role" class="filter-select" style="width:150px">
                        <option value="admin" ${account.role === 'admin' ? 'selected' : ''}>管理员</option>
                        <option value="operator" ${account.role === 'operator' ? 'selected' : ''}>运营专员</option>
                        <option value="finance" ${account.role === 'finance' ? 'selected' : ''}>财务人员</option>
                        <option value="customer_service" ${account.role === 'customer_service' ? 'selected' : ''}>客服人员</option>
                      </select>
                    </div>
                  </div>
                  <div class="detail-row">
                    <div class="detail-label">手机号</div>
                    <div class="detail-value"><input type="tel" id="edit-acc-phone" class="filter-input" value="${account.phone}" style="width:150px"></div>
                  </div>
                  <div class="detail-row">
                    <div class="detail-label">邮箱</div>
                    <div class="detail-value"><input type="email" id="edit-acc-email" class="filter-input" value="${account.email}" style="width:200px"></div>
                  </div>
                  <div class="detail-row">
                    <div class="detail-label">重置密码</div>
                    <div class="detail-value"><input type="password" id="edit-acc-newpass" class="filter-input" placeholder="不填则不修改" style="width:180px"></div>
                  </div>
                </div>
                <div class="modal-footer">
                  <button class="table-btn" onclick="closeModal()">取消</button>
                  <button class="table-btn primary" onclick="setTimeout(function(){saveEditAccount(${account.id})}, 50)">保存修改</button>
                </div>
              </div>
            </div>
          `
        }
      } else if (state.modal === 'refund') {
        const order = state.orders.find(o => o.id === state.modalData)
        if (order) {
          modalContent = `
            <div class="modal-overlay" onclick="if(event.target===this)closeModal()">
              <div class="modal-content" style="max-width:500px">
                <div class="modal-header">
                  <div class="modal-title">💰 订单退款</div>
                  <div class="modal-close" onclick="closeModal()">&times;</div>
                </div>
                <div class="modal-body">
                  <div style="background:#FFF5F5;border-radius:12px;padding:20px;margin-bottom:20px;text-align:center">
                    <div style="font-size:14px;color:#666;margin-bottom:8px">订单金额</div>
                    <div style="font-size:32px;font-weight:bold;color:#E8885A">¥${order.total_price}</div>
                    <div style="font-size:12px;color:#999;margin-top:8px">订单号：${order.order_no}</div>
                  </div>
                  
                  <div class="detail-row">
                    <div class="detail-label"><span style="color:red">*</span>退款金额</div>
                    <div class="detail-value">
                      <input type="number" id="refund-amount" class="filter-input" placeholder="请输入退款金额" style="width:150px;font-size:16px" value="${order.total_price}" onclick="this.select()">
                      <span style="color:#999;margin-left:8px">元</span>
                    </div>
                  </div>
                  
                  <div id="refund-tip" style="display:none;background:#FFF3E0;border-radius:8px;padding:12px;margin-top:16px;font-size:13px">
                    <span style="color:#E8885A">⚠️ </span>
                    <span id="refund-tip-text"></span>
                  </div>
                  
                  <div class="detail-row" style="margin-top:16px">
                    <div class="detail-label">退款原因</div>
                    <div class="detail-value">
                      <select class="filter-select" style="width:200px" id="refund-reason">
                        <option>客户主动取消</option>
                        <option>商家无房/满房</option>
                        <option>房间设施问题</option>
                        <option>服务态度差</option>
                        <option>其他原因</option>
                      </select>
                    </div>
                  </div>
                  
                  <div class="detail-row">
                    <div class="detail-label">备注说明</div>
                    <div class="detail-value">
                      <textarea id="refund-note" class="filter-input" rows="2" placeholder="可填写退款说明" style="width:100%;resize:vertical"></textarea>
                    </div>
                  </div>
                  
                  <div style="margin-top:20px;padding:16px;background:#f9f9f9;border-radius:8px;font-size:13px;color:#666">
                    <div style="margin-bottom:8px">📌 退款说明：</div>
                    <ul style="margin:0;padding-left:20px;line-height:1.8">
                      <li>退款金额必须与实际订单金额一致</li>
                      <li>退款后将自动通知客户</li>
                      <li>退款原路返回，约1-7个工作日到账</li>
                    </ul>
                  </div>
                </div>
                <div class="modal-footer">
                  <button class="table-btn" onclick="closeModal()">取消</button>
                  <button class="table-btn danger" onclick="processRefund(${order.id}, ${order.total_price})" id="refund-btn" disabled>确认退款</button>
                </div>
              </div>
            </div>
          `
        }
      }
      
      return modalContent
    }
    
    // ====== 导出功能 ======
    function exportData(type) {
      alert(`正在导出${type}数据...\n（演示功能，实际项目中会生成Excel/CSV文件下载）`)
    }
    
    // ====== 房型管理功能 ======
    function openRoomModal(id) {
      state.modal = 'room-edit'
      state.modalData = id
      render()
    }
    
    function openRoomStatus(id) {
      state.modal = 'room-status'
      state.modalData = id
      render()
    }
    
    function saveRoom() {
      alert('房型信息已保存！')
      closeModal()
      render()
    }
    
    function saveRoomStatus() {
      alert('房态信息已保存！')
      closeModal()
      render()
    }
    
    // ====== 商家管理操作 ======
    function approveMerchant(id) {
      if (confirm('确定要通过该商家的入驻申请吗？')) {
        const merchant = state.merchants.find(m => m.id === id)
        if (merchant) merchant.status = 1
        render()
        alert('商家审核已通过！')
      }
    }
    
    function rejectMerchant(id) {
      if (confirm('确定要拒绝该商家的入驻申请吗？')) {
        const merchant = state.merchants.find(m => m.id === id)
        if (merchant) merchant.status = -1
        render()
        alert('商家申请已拒绝')
      }
    }
    
    function disableMerchant(id) {
      if (confirm('确定要禁用该商家吗？')) {
        const merchant = state.merchants.find(m => m.id === id)
        if (merchant) merchant.status = -1
        render()
        alert('商家已禁用')
      }
    }
    
    // ====== 订单管理操作 ======
    function confirmOrder(id) {
      const order = state.orders.find(o => o.id === id)
      if (order) {
        order.status = 'paid'
        render()
        alert('订单已确认！')
      }
    }
    
    function completeOrder(id) {
      const order = state.orders.find(o => o.id === id)
      if (order) {
        order.status = 'completed'
        render()
        alert('订单已完成！')
      }
    }
    
    // ====== 评价管理操作 ======
    function approveReview(id) {
      const review = state.reviews.find(r => r.id === id)
      if (review) {
        review.status = 'approved'
        render()
        alert('评价已通过！')
      }
    }
    
    function rejectReview(id) {
      if (confirm('确定要拒绝该评价吗？')) {
        const review = state.reviews.find(r => r.id === id)
        if (review) review.status = 'rejected'
        render()
        alert('评价已拒绝')
      }
    }
    
    function deleteReview(id) {
      if (confirm('确定要删除该评价吗？\n\n删除后不可恢复！')) {
        const index = state.reviews.findIndex(r => r.id === id)
        if (index > -1) {
          state.reviews.splice(index, 1)
          render()
          alert('评价已删除！')
        }
      }
    }
    
    // ====== 系统设置操作 ======
    function toggle2FA() {
      alert('双重认证功能演示：\n\n实际项目中将引导用户绑定手机号或邮箱进行二次验证。')
    }
    
    function savePassword() {
      alert('密码修改成功！')
      closeModal()
    }
    
    function saveReviewReply() {
      alert('回复已提交！')
      closeModal()
    }
    
    function saveNewMerchant() {
      alert('商家信息已提交，等待审核！')
      closeModal()
      render()
    }
    
    function saveNewOrder() {
      alert('订单创建成功！')
      closeModal()
      render()
    }
    
    function saveNewRoom() {
      alert('房型添加成功！')
      closeModal()
      render()
    }
    
    function saveNewCampaign() {
      alert('营销活动创建成功！')
      closeModal()
      render()
    }
    
    // ====== 退款功能 ======
    function openRefundModal(id) {
      state.modal = 'refund'
      state.modalData = id
      render()
      // 延迟添加金额验证
      setTimeout(() => {
        const input = document.getElementById('refund-amount')
        if (input) {
          input.addEventListener('input', validateRefundAmount)
          validateRefundAmount() // 初始验证
        }
      }, 100)
    }
    
    function validateRefundAmount() {
      const input = document.getElementById('refund-amount')
      const btn = document.getElementById('refund-btn')
      const tip = document.getElementById('refund-tip')
      const tipText = document.getElementById('refund-tip-text')
      
      if (!input || !btn) return
      
      const amount = parseFloat(input.value)
      const order = state.orders.find(o => o.id === state.modalData)
      if (!order) return
      
      const actualAmount = order.total_price
      
      if (isNaN(amount) || amount <= 0) {
        btn.disabled = true
        tip.style.display = 'block'
        tipText.textContent = '请输入有效的退款金额'
        tip.style.background = '#FFF3E0'
        tipText.style.color = '#E8885A'
      } else if (amount !== actualAmount) {
        btn.disabled = true
        tip.style.display = 'block'
        tipText.textContent = `金额不一致！实际订单金额为 ¥${actualAmount}，请输入相同金额`
        tip.style.background = '#FFEBEE'
        tipText.style.color = '#f56c6c'
      } else {
        btn.disabled = false
        tip.style.display = 'none'
      }
    }
    
    function processRefund(id, actualAmount) {
      const input = document.getElementById('refund-amount')
      const reason = document.getElementById('refund-reason').value
      const note = document.getElementById('refund-note').value
      
      if (!input) return
      
      const amount = parseFloat(input.value)
      
      // 最终验证
      if (amount !== actualAmount) {
        alert('退款金额必须与订单金额一致！\n实际订单金额：¥' + actualAmount)
        return
      }
      
      // 确认退款
      if (confirm(`确定要退款 ¥${amount} 吗？\n\n退款原因：${reason}\n备注：${note || '无'}`)) {
        const order = state.orders.find(o => o.id === id)
        if (order) {
          order.status = 'refunded'
          order.refund_amount = amount
          order.refund_time = new Date().toISOString()
        }
        
        // 添加退款消息通知
        state.notifications.unshift({
          id: Date.now(),
          title: '💰 退款成功',
          content: `订单 ${order ? order.order_no : id} 已退款 ¥${amount}，资金将原路返回`,
          time: '刚刚',
          read: false
        })
        saveNotifications()
        
        closeModal()
        render()
        alert(`✅ 退款成功！\n\n退款金额：¥${amount}\n退款原因：${reason}\n\n资金将在1-7个工作日内原路返回给客户。`)
      }
    }
    
    // ====== 账号管理功能 ======
    function toggleAccountStatus(id) {
      const account = accounts.find(a => a.id === id)
      if (!account) return
      
      if (account.id === state.currentUser.id) {
        alert('不能禁用当前登录的账号！')
        return
      }
      
      const action = account.status === 'active' ? '禁用' : '启用'
      if (confirm(`确定要${action}账号 "${account.name}" 吗？`)) {
        account.status = account.status === 'active' ? 'inactive' : 'active'
        render()
        alert(`账号已${action}！`)
      }
    }
    
    function deleteAccount(id) {
      const account = accounts.find(a => a.id === id)
      if (!account) return
      
      if (account.id === state.currentUser.id) {
        alert('不能删除当前登录的账号！')
        return
      }
      
      if (confirm(`确定要删除账号 "${account.name}" 吗？\n\n此操作不可恢复！`)) {
        const index = accounts.findIndex(a => a.id === id)
        if (index > -1) {
          accounts.splice(index, 1)
          render()
          alert('账号已删除！')
        }
      }
    }
    
    // ====== 权限设置功能 ======
    function toggleRolePermission(roleKey, permission) {
      const role = roles[roleKey]
      if (!role) return
      
      const index = role.permissions.indexOf(permission)
      if (index > -1) {
        role.permissions.splice(index, 1)
      } else {
        role.permissions.push(permission)
      }
    }
    
    function savePermissions() {
      alert('权限配置已保存！\n\n注意：当前登录账号的权限变更将在下次登录时生效。')
      render()
    }
    
    function saveNewAccount() {
      const username = document.getElementById('acc-username').value.trim()
      const password = document.getElementById('acc-password').value.trim()
      const name = document.getElementById('acc-name').value.trim()
      const role = document.getElementById('acc-role').value
      const phone = document.getElementById('acc-phone').value.trim()
      const email = document.getElementById('acc-email').value.trim()
      
      if (!username || !password || !name) {
        alert('请填写必填项（用户名、密码、姓名）')
        return
      }
      
      if (accounts.find(a => a.username === username)) {
        alert('用户名已存在！')
        return
      }
      
      const newAccount = {
        id: Date.now(),
        username,
        password,
        name,
        role,
        phone: phone || '-',
        email: email || '-',
        status: 'active',
        created_at: new Date().toISOString()
      }
      
      accounts.push(newAccount)
      closeModal()
      render()
      alert('账号添加成功！')
    }
    
    function saveEditAccount(id) {
      const account = accounts.find(a => a.id === id)
      if (!account) return
      
      const name = document.getElementById('edit-acc-name').value.trim()
      const role = document.getElementById('edit-acc-role').value
      const phone = document.getElementById('edit-acc-phone').value.trim()
      const email = document.getElementById('edit-acc-email').value.trim()
      const newPass = document.getElementById('edit-acc-newpass').value.trim()
      
      if (!name) {
        alert('姓名不能为空！')
        return
      }
      
      account.name = name
      account.role = role
      account.phone = phone || account.phone
      account.email = email || account.email
      
      if (newPass) {
        account.password = newPass
      }
      
      closeModal()
      render()
      alert('账号信息已更新！')
    }
    
    // ====== 初始化 ======
    render()
    if (state.logged) loadDashboard()
  </script>
</body>
</html>
